name: wytchr-test

services:
  pg:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=wytchr
      - POSTGRES_PASSWORD=wytchr
      - POSTGRES_DB=wytchr
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wytchr"]
      interval: 1s
      timeout: 3s
      retries: 30

  wytchr:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      pg:
        condition: service_healthy
    environment:
      - API_TOKEN=test-token
      # Placeholder — outbound YouTube API calls won't succeed in tests
      # without a real key. Boot / DB / form rendering still exercise.
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-fake-test-key}
      - DATABASE_URL=postgresql://wytchr:wytchr@pg:5432/wytchr
      - POLL_INTERVAL_MINUTES=60
    ports:
      - "5050:5000"
