<div class="tags" id="tags-v-{{ video_id }}">
  {% for tag in tags %}
    <span class="tag">
      <a class="tag-link" href="?tag={{ tag }}"
         hx-get="/board?tag={{ tag }}"
         hx-target="#board"
         hx-swap="innerHTML"
         hx-push-url="?tag={{ tag }}">{{ tag.split(':', 1)[1] if ':' in tag else tag }}</a>
      <button class="tag-x"
              hx-delete="/videos/{{ video_id }}/tags/{{ tag }}"
              hx-target='[id="tags-v-{{ video_id }}"]'
              hx-swap="outerHTML"
              aria-label="remove tag">×</button>
    </span>
  {% endfor %}
  <button class="tag-edit-btn" type="button" aria-label="add tag">+</button>
  <form class="tag-add"
        hx-post="/videos/{{ video_id }}/tags"
        hx-target='[id="tags-v-{{ video_id }}"]'
        hx-swap="outerHTML">
    <input name="name" placeholder="prefix:tag" maxlength="64" autocomplete="off" aria-label="add tag">
  </form>
</div>
