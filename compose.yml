services:
  wytchr:
    image: ghcr.io/kjaymiller/wytchr:latest
    container_name: wytchr
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TZ:-UTC}
      - DB_PATH=/data/wytchr.db
      - YTDL_SUB_API_URL=${YTDL_SUB_API_URL:-http://ytdl-sub-api:5000}
      - POLL_INTERVAL_MINUTES=${POLL_INTERVAL_MINUTES:-30}
      - POLL_LIMIT=${POLL_LIMIT:-30}
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
